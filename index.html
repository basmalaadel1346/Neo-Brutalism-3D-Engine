<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Neo-Brutalism 3D Engine - Interactive 3D physics simulation with responsive image gallery" />
    <title>Ultimate Neo-Brutalism 3D Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="panel-hidden" role="application" aria-label="3D Card Gallery Engine">

    <div class="app-layout">

        <aside class="engine-panel" id="controls" role="complementary" aria-label="Physics Engine Controls">
            <h2>Physics Engine Tuning</h2>
            <button id="enable-motion" class="motion-btn"
                aria-label="Enable device motion sensors for gyroscope control">📱 تفعيل حساسات الحركة</button>
            <fieldset class="controls-group">
                <legend>Control Weights</legend>
                <div class="control-group">
                    <label for="w-local">Local Hover <span>(Mouse)</span></label>
                    <input type="range" id="w-local" min="0" max="30" value="15" aria-valuemin="0" aria-valuemax="30"
                        aria-label="Local hover effect weight">
                    <output for="w-local" id="w-local-value">15</output>
                </div>
                <div class="control-group">
                    <label for="w-global">Global Gravity <span>(Env)</span></label>
                    <input type="range" id="w-global" min="0" max="10" value="3" aria-valuemin="0" aria-valuemax="10"
                        aria-label="Global gravity effect weight">
                    <output for="w-global" id="w-global-value">3</output>
                </div>
                <div class="control-group">
                    <label for="w-gyro">Gyroscope <span>(Device)</span></label>
                    <input type="range" id="w-gyro" min="0" max="40" value="20" aria-valuemin="0" aria-valuemax="40"
                        aria-label="Gyroscope device weight">
                    <output for="w-gyro" id="w-gyro-value">20</output>
                </div>
                <div class="control-group">
                    <label for="w-scroll">Scroll Velocity <span>(Pulse)</span></label>
                    <input type="range" id="w-scroll" min="0" max="1" step="0.01" value="0.1" aria-valuemin="0"
                        aria-valuemax="1" aria-label="Scroll velocity pulse weight">
                    <output for="w-scroll" id="w-scroll-value">0.1</output>
                </div>
            </fieldset>
        </aside>

        <div class="hud-controls" role="toolbar" aria-label="Application controls">
            <button class="btn" id="toggle-panel" aria-label="Toggle Physics Control Panel" aria-pressed="true">⚙️
                Tuning</button>
            <button class="btn" id="gyro-btn" aria-label="Toggle Device Motion Sensors">📱 Motion: OFF</button>
            <button class="btn" id="theme-btn" aria-label="Switch between Dark and Light Mode">🌙 Theme</button>
        </div>

        <div id="fps-meter" role="status" aria-label="Performance metrics" aria-live="polite">FPS: 60 | Nodes: 0</div>

        <main class="card-grid" id="grid" role="main" aria-label="Image Gallery">
        </main>

    </div>

    <script src="js/imageOptimizer.js" type="module" defer></script>
    <script src="js/main.js" type="module" defer></script>
</body>

</html>
